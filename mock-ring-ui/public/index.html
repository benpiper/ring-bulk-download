<!DOCTYPE html>
<html lang="en-us" theme-preference="light" class=" ">
<head>
  <meta charset="utf-8">
  <title>Activity</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Ring meta tags mimicked for Puppeteer login-status check context -->
  <meta name="last-challenge-type" id="last-challenge-type" content="password+2fa">
  <meta name="current-stage" id="current-stage" content="mock">
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TOP NAVIGATION BAR                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <nav class="ring-topnav">
    <div class="topnav-inner">
      <div class="topnav-brand">
        <svg class="ring-logo" viewBox="0 0 60 60" width="36" height="36">
          <circle cx="30" cy="30" r="28" fill="none" stroke="#1998d5" stroke-width="3"/>
          <circle cx="30" cy="30" r="18" fill="none" stroke="#1998d5" stroke-width="2.5"/>
          <circle cx="30" cy="30" r="8" fill="#1998d5"/>
        </svg>
        <span class="brand-text">ring</span>
      </div>
      <div class="topnav-links">
        <a href="#" class="nav-link">Dashboard</a>
        <a href="#" class="nav-link">Devices</a>
        <a href="#" class="nav-link active">Activity</a>
        <a href="#" class="nav-link">Plans</a>
      </div>
      <div class="topnav-right">
        <button class="nav-icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <div class="nav-avatar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MOCK BANNER (dev indicator)                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="mock-banner">
    <span>⚠️ MOCK ENVIRONMENT</span> — This is a simulated Ring Activity History page for testing
  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PAGE CONTENT                                            -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="page-container">
    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Activity</h1>
      </div>
      <div class="page-header-right">
        <!-- Pencil icon to enter manage mode; data-testid preserved for Puppeteer -->
        <button
          data-testid="manage-events__select-multiple"
          class="manage-pencil-btn"
          id="selectMultipleBtn"
          onclick="toggleManageMode()"
          title="Manage events"
        >
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Manage Mode Toolbar Container -->
    <div id="manageToolbarContainer"></div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('motion', this)">Motions</button>
      <button class="filter-tab" onclick="setFilter('ding', this)">Dings</button>
      <button class="filter-tab" onclick="setFilter('on_demand', this)">Live Views</button>
    </div>

    <!-- Event List -->
    <div class="event-list" id="eventList">
      <!-- Events are dynamically generated by app.js -->
    </div>

    <!-- Loading indicator for infinite scroll -->
    <div class="scroll-loader" id="scrollLoader">
      <div class="loader-spinner"></div>
      <span>Loading more events...</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
